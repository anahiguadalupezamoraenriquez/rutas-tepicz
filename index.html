<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Rutas Tepic Pro</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #eef2f7;
  }

  header {
    background: linear-gradient(90deg, #1e3c72, #2a5298);
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
  }

  #container {
    display: flex;
    height: 100vh;
  }

  #map {
    width: 70%;
  }

  #sidebar {
    width: 30%;
    background: white;
    padding: 15px;
    overflow-y: auto;
    box-shadow: -5px 0 10px rgba(0,0,0,0.1);
  }

  input {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: #f1f1f1;
    margin-bottom: 15px;
  }

  .ruta {
    background: #fff;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 12px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.08);
    cursor: pointer;
    transition: 0.2s;
  }

  .ruta:hover {
    transform: scale(1.02);
  }

  .titulo {
    font-weight: bold;
    font-size: 16px;
  }

  .tag {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 8px;
    color: white;
    font-size: 12px;
    margin-top: 5px;
  }

  button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: #2a5298;
    color: white;
    margin-bottom: 10px;
    cursor: pointer;
  }

</style>
</head>

<body>

<header>🚌 Rutas Inteligentes de Tepic</header>

<div id="container">
  <div id="map"></div>

  <div id="sidebar">
    <button onclick="ubicar()">📍 Mi ubicación</button>
    <input type="text" id="buscador" placeholder="Buscar ruta o colonia...">
    <div id="lista"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([21.5085, -104.895], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// Rutas más realistas
const rutas = [
{
  nombre: "Centro - Xalisco",
  color: "#007bff",
  horario: "6:00 - 22:00",
  coords: [
    [21.5085,-104.895],
    [21.51,-104.90],
    [21.52,-104.91],
    [21.53,-104.92]
  ],
  paradas: ["Centro", "IMSS", "Libramiento", "Xalisco"]
},
{
  nombre: "Centro - Forum",
  color: "#e74c3c",
  horario: "6:30 - 21:30",
  coords: [
    [21.5085,-104.895],
    [21.507,-104.88],
    [21.506,-104.875],
    [21.505,-104.87]
  ],
  paradas: ["Centro", "Soriana", "Plaza Forum"]
},
{
  nombre: "Centro - Mololoa",
  color: "#2ecc71",
  horario: "5:30 - 21:00",
  coords: [
    [21.5085,-104.895],
    [21.515,-104.885],
    [21.52,-104.88]
  ],
  paradas: ["Centro", "Mololoa"]
}
];

let capas = [];

function render(lista){
  capas.forEach(c=>map.removeLayer(c));
  capas=[];

  const cont = document.getElementById("lista");
  cont.innerHTML="";

  lista.forEach(r=>{

    const linea = L.polyline(r.coords,{color:r.color, weight:5}).addTo(map);
    capas.push(linea);

    r.coords.forEach((c,i)=>{
      let m=L.circleMarker(c,{radius:6,color:r.color}).addTo(map)
      .bindPopup(r.paradas[i]||"Parada");
      capas.push(m);
    });

    const div=document.createElement("div");
    div.className="ruta";

    div.innerHTML=`
      <div class="titulo">${r.nombre}</div>
      <div>🕒 ${r.horario}</div>
      <div>${r.paradas.join(" → ")}</div>
      <div class="tag" style="background:${r.color}">Ruta</div>
    `;

    div.onclick=()=>map.fitBounds(linea.getBounds());

    cont.appendChild(div);
  });
}

// buscador
document.getElementById("buscador").addEventListener("input",function(){
  const t=this.value.toLowerCase();

  const f=rutas.filter(r=>
    r.nombre.toLowerCase().includes(t) ||
    r.paradas.join(" ").toLowerCase().includes(t)
  );

  render(f);
});

// ubicación
function ubicar(){
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos=>{
      const lat=pos.coords.latitude;
      const lon=pos.coords.longitude;

      const userMarker=L.marker([lat,lon]).addTo(map)
        .bindPopup("Estás aquí").openPopup();

      map.setView([lat,lon],14);
    });
  }
}

render(rutas);

</script>

</body>
</html>
